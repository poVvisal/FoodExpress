<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FoodExpress</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #e8431a, #ff7043);
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      box-shadow: 0 4px 20px rgba(232,67,26,0.4);
    }
    header .logo { font-size: 2rem; }
    header h1 { font-size: 1.8rem; font-weight: 800; letter-spacing: -0.5px; }
    header p  { font-size: 0.85rem; opacity: 0.85; }

    main {
      max-width: 1100px;
      margin: 2rem auto;
      padding: 0 1.5rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }

    .response-panel {
      grid-column: 1 / -1;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      padding: 1.4rem;
    }
    .card h2 {
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #ff7043;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-group { display: flex; flex-direction: column; gap: 0.6rem; }

    button {
      width: 100%;
      padding: 0.65rem 1rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      transition: filter 0.15s, transform 0.1s;
      text-align: left;
    }
    button:hover  { filter: brightness(1.15); }
    button:active { transform: scale(0.97); }

    .btn-get    { background: #1e6e3e; color: #a7f3c0; }
    .btn-post   { background: #1a3a6e; color: #a7c8f3; }
    .btn-put    { background: #6e5a1a; color: #f3dda7; }
    .btn-delete { background: #6e1a1a; color: #f3a7a7; }

    .badge {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 0.15rem 0.45rem;
      border-radius: 4px;
      margin-right: 0.4rem;
      vertical-align: middle;
    }
    .badge-get    { background: #1e6e3e; color: #a7f3c0; }
    .badge-post   { background: #1a3a6e; color: #a7c8f3; }
    .badge-put    { background: #6e5a1a; color: #f3dda7; }
    .badge-delete { background: #6e1a1a; color: #f3a7a7; }

    /* Response panel */
    .response-panel .card h2 { color: #aaa; }
    #response-meta {
      display: flex;
      gap: 1rem;
      align-items: center;
      margin-bottom: 0.75rem;
      font-size: 0.8rem;
      color: #888;
    }
    #response-status {
      font-weight: 700;
      padding: 0.2rem 0.6rem;
      border-radius: 6px;
      font-size: 0.8rem;
    }
    .status-ok  { background: #1e6e3e; color: #a7f3c0; }
    .status-err { background: #6e1a1a; color: #f3a7a7; }

    pre {
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 1rem 1.2rem;
      font-size: 0.82rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      color: #cce;
      max-height: 340px;
      overflow-y: auto;
    }

    #loading {
      display: none;
      text-align: center;
      padding: 2rem;
      color: #ff7043;
      font-weight: 600;
      letter-spacing: 0.1em;
      font-size: 0.9rem;
    }

    @media (max-width: 680px) {
      main { grid-template-columns: 1fr; }
      .response-panel { grid-column: 1; }
    }
  </style>
</head>
<body>

<header>
  <span class="logo">🍔</span>
  <div>
    <h1>FoodExpress</h1>
    <p>API Dashboard — Click a button to fire a request</p>
  </div>
</header>

<main>

  <!-- Status -->
  <div class="card">
    <h2>📡 Status</h2>
    <div class="btn-group">
      <button class="btn-get"    onclick="call('GET',  '/api/status')">
        <span class="badge badge-get">GET</span>/api/status
      </button>
      <button class="btn-post"   onclick="call('POST', '/api/status')">
        <span class="badge badge-post">POST</span>/api/status
      </button>
      <button class="btn-put"    onclick="call('PUT',  '/api/status')">
        <span class="badge badge-put">PUT</span>/api/status
      </button>
    </div>
  </div>

  <!-- Menu -->
  <div class="card">
    <h2>🍕 Menu</h2>
    <div class="btn-group">
      <button class="btn-get"  onclick="call('GET', '/api/menu')">
        <span class="badge badge-get">GET</span>/api/menu — List all items
      </button>
      <button class="btn-post" onclick="call('POST', '/api/menu', { name: 'Pepperoni Pizza', price: 14.99, category: 'Pizza' })">
        <span class="badge badge-post">POST</span>/api/menu — Add item
      </button>
    </div>
  </div>

  <!-- Restaurants -->
  <div class="card">
    <h2>🏪 Restaurants</h2>
    <div class="btn-group">
      <button class="btn-get"  onclick="call('GET', '/api/restaurants')">
        <span class="badge badge-get">GET</span>/api/restaurants — List all
      </button>
      <button class="btn-post" onclick="call('POST', '/api/restaurants', { name: 'Sushi Bay', cuisine: 'Japanese', rating: 4.9, deliveryTime: '35-45 min' })">
        <span class="badge badge-post">POST</span>/api/restaurants — Add restaurant
      </button>
    </div>
  </div>

  <!-- Orders -->
  <div class="card">
    <h2>📦 Orders</h2>
    <div class="btn-group">
      <button class="btn-get"    onclick="call('GET', '/api/orders')">
        <span class="badge badge-get">GET</span>/api/orders — List all orders
      </button>
      <button class="btn-post"   onclick="call('POST', '/api/orders', { item: 'Margherita Pizza', quantity: 2, address: '42 Hunger Lane' })">
        <span class="badge badge-post">POST</span>/api/orders — Place order
      </button>
      <button class="btn-get"    onclick="call('GET', '/api/orders/1')">
        <span class="badge badge-get">GET</span>/api/orders/1 — Get order #1
      </button>
      <button class="btn-put"    onclick="call('PUT', '/api/orders/1', { status: 'Out for Delivery' })">
        <span class="badge badge-put">PUT</span>/api/orders/1 — Update status
      </button>
      <button class="btn-delete" onclick="call('DELETE', '/api/orders/1')">
        <span class="badge badge-delete">DELETE</span>/api/orders/1 — Cancel order
      </button>
    </div>
  </div>

  <!-- Response -->
  <div class="card response-panel">
    <h2>🖥️ Server Response</h2>
    <div id="response-meta">
      <span id="response-status"></span>
      <span id="response-url"></span>
      <span id="response-time"></span>
    </div>
    <div id="loading">⏳ Fetching...</div>
    <pre id="response-body">Click any button above to send a request and see the response here.</pre>
  </div>

</main>

<script>
  // When opened as a local file (file://) point to the running server.
  // When served by Express directly, use relative paths.
  const API_BASE = window.location.protocol === 'file:' ? 'http://localhost:3000' : '';

  async function call(method, url, body) {
    url = API_BASE + url;
    const pre    = document.getElementById('response-body');
    const status = document.getElementById('response-status');
    const urlEl  = document.getElementById('response-url');
    const timeEl = document.getElementById('response-time');
    const loader = document.getElementById('loading');

    pre.textContent = '';
    loader.style.display = 'block';
    status.textContent = '';
    status.className = '';
    urlEl.textContent = `${method} ${url}`;
    timeEl.textContent = '';

    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (body) opts.body = JSON.stringify(body);

    const t0 = performance.now();
    try {
      const res  = await fetch(url, opts);
      const ms   = Math.round(performance.now() - t0);
      const data = await res.json();

      loader.style.display = 'none';
      status.textContent = `${res.status} ${res.statusText}`;
      status.className   = res.ok ? 'status-ok' : 'status-err';
      timeEl.textContent = `${ms} ms`;
      pre.textContent    = JSON.stringify(data, null, 2);
    } catch (err) {
      loader.style.display = 'none';
      status.textContent = 'Network Error';
      status.className   = 'status-err';
      pre.textContent    = String(err);
    }
  }
</script>

</body>
</html>
